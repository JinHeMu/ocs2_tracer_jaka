# =============================================================================
# Tracer + Jaka ZU5 控制器配置 (ROS 2 Jazzy + gz_ros2_control)
# =============================================================================
# 控制器一览：
#   1. joint_state_broadcaster      : 发布 /joint_states
#   2. diff_drive_controller        : 接 OCS2 底盘速度  -> /cmd_vel + 发布 /odom
#   3. arm_trajectory_controller    : 接 OCS2 机械臂轨迹 -> /arm_trajectory_controller/joint_trajectory
# =============================================================================

controller_manager:
  ros__parameters:
    update_rate: 200    # 200 Hz，OCS2 MPC 通常 100~400 Hz，这里取中间值

    # ---- 控制器声明 ----
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    diff_drive_controller:
      type: diff_drive_controller/DiffDriveController

    arm_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # 备选：纯速度前向控制器（OCS2 直接输出关节速度时启用）
    arm_velocity_controller:
      type: velocity_controllers/JointGroupVelocityController


# -----------------------------------------------------------------------------
# 差速底盘控制器
# -----------------------------------------------------------------------------
diff_drive_controller:
  ros__parameters:
    left_wheel_names:  ["left_wheel"]
    right_wheel_names: ["right_wheel"]

    wheel_separation: 0.34       # 两驱动轮中心距 (左右轮 y = ±0.17)
    wheel_radius:     0.085

    # 由于使用 mesh -> URDF 转换，左右轮可能有正负不一致问题；如需调试可改这里
    wheel_separation_multiplier: 1.0
    left_wheel_radius_multiplier:  1.0
    right_wheel_radius_multiplier: 1.0

    publish_rate: 50.0
    odom_frame_id: odom
    base_frame_id: base_footprint
    pose_covariance_diagonal:  [0.001, 0.001, 0.0, 0.0, 0.0, 0.01]
    twist_covariance_diagonal: [0.001, 0.0,   0.0, 0.0, 0.0, 0.01]

    open_loop: false
    enable_odom_tf: true

    cmd_vel_timeout: 0.5
    use_stamped_vel: false        # OCS2 端发 geometry_msgs/Twist 即可
    publish_limited_velocity: true

    # 速度 / 加速度限制
    linear:
      x:
        has_velocity_limits:     true
        has_acceleration_limits: true
        max_velocity:        1.5
        min_velocity:       -1.5
        max_acceleration:    2.0
        min_acceleration:   -2.0
    angular:
      z:
        has_velocity_limits:     true
        has_acceleration_limits: true
        max_velocity:        2.0
        min_velocity:       -2.0
        max_acceleration:    3.0
        min_acceleration:   -3.0


# -----------------------------------------------------------------------------
# 机械臂轨迹控制器（推荐：OCS2 输出 trajectory_msgs/JointTrajectory）
# -----------------------------------------------------------------------------
arm_trajectory_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6

    command_interfaces:
      - position
      - velocity      # OCS2 同时给位置与速度参考，跟踪更稳

    state_interfaces:
      - position
      - velocity

    state_publish_rate:   200.0
    action_monitor_rate:   20.0
    allow_partial_joints_goal: false
    open_loop_control:        false
    allow_integration_in_goal_trajectories: true

    constraints:
      stopped_velocity_tolerance: 0.05
      goal_time: 0.0
      joint_1: { trajectory: 0.10, goal: 0.05 }
      joint_2: { trajectory: 0.10, goal: 0.05 }
      joint_3: { trajectory: 0.10, goal: 0.05 }
      joint_4: { trajectory: 0.10, goal: 0.05 }
      joint_5: { trajectory: 0.10, goal: 0.05 }
      joint_6: { trajectory: 0.10, goal: 0.05 }


# -----------------------------------------------------------------------------
# 备选：纯关节速度控制器（适合 OCS2 直接输出速度指令的情况）
#   启用时把 launch 里 spawner 改成 arm_velocity_controller 即可
# -----------------------------------------------------------------------------
arm_velocity_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    interface_name: velocity
