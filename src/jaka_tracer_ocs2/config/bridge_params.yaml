# Parameters for the OCS2 ↔ Jaka/Tracer bridge node
jaka_tracer_ocs2_bridge:
  ros__parameters:
    # 必须与 task.info 中机械臂关节顺序完全一致
    arm_joint_names:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6

    # 与 OCS2 mobile_manipulator MPC 节点中的 robotName 一致
    # 它决定 topic 名: /<robot_name>_mpc_observation, /<robot_name>_mpc_policy
    robot_name: "mobile_manipulator"

    # SystemObservation 上报频率（与 task.info 中 mpcDesiredFrequency 接近即可）
    observation_rate_hz: 25.0

    # 机器人指令下发频率
    control_rate_hz: 200.0

    # 给 JointTrajectoryController 的目标点放在多少秒之后；
    # 太小会让 JTC 无法平滑插值，太大会延迟控制响应
    traj_lookahead_s: 0.04

    # 速度安全阈值
    base_max_v: 0.5
    base_max_w: 1.0

    # 调试用开关
    send_base_cmd: true
    send_arm_cmd: true
